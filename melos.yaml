name: pocket

# Multi-package workspace tooling (optional for running the app — the app uses
# path dependencies directly). Install with `dart pub global activate melos`,
# then `melos bootstrap` / `melos run test`.
packages:
  - apps/**
  - packages/**

scripts:
  test:
    description: Run tests in all packages that have them.
    run: dart test
    exec:
      concurrency: 1
    packageFilters:
      dirExists: test

  analyze:
    description: Analyze all packages.
    run: dart analyze
