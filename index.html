<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Pocket — Personal Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
        colors: {
          bg:     { DEFAULT: '#ffffff', dark: '#09090b' },
          card:   { DEFAULT: '#ffffff', dark: '#0c0c0f' },
          muted:  { DEFAULT: '#f4f4f5', dark: '#18181b' },
          border: { DEFAULT: '#e4e4e7', dark: '#27272a' },
          fg:     { DEFAULT: '#09090b', dark: '#fafafa' },
          subtle: { DEFAULT: '#71717a', dark: '#a1a1aa' },
        }
      }
    }
  }
</script>
<style>
  html, body { font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  body { background: #fafafa; color: #09090b; }
  html.dark body { background: #09090b; color: #fafafa; }

  /* ── Cards ── */
  .card       { background:#ffffff; border:1px solid #e4e4e7; border-radius:14px; }
  .card-muted { background:#fafafa; border:1px solid #e4e4e7; border-radius:14px; }
  html.dark .card       { background:#0c0c0f; border-color:#1f1f23; }
  html.dark .card-muted { background:#0a0a0d; border-color:#1f1f23; }

  /* ── Buttons ── */
  .btn { display:inline-flex; align-items:center; gap:.5rem; padding:.55rem .9rem; border-radius:10px; font-weight:500; font-size:.875rem; transition:all .15s ease; border:1px solid transparent; cursor:pointer; }
  .btn-primary { background:#09090b; color:#fafafa; }
  .btn-primary:hover { background:#27272a; }
  html.dark .btn-primary { background:#fafafa; color:#09090b; }
  html.dark .btn-primary:hover { background:#e4e4e7; }
  .btn-ghost { background:transparent; color:inherit; }
  .btn-ghost:hover { background:#f4f4f5; }
  html.dark .btn-ghost:hover { background:#18181b; }
  .btn-outline { background:transparent; border-color:#e4e4e7; color:inherit; }
  .btn-outline:hover { background:#f4f4f5; }
  html.dark .btn-outline { border-color:#27272a; }
  html.dark .btn-outline:hover { background:#18181b; }

  /* ── Inputs ── */
  .input, .select, .textarea { width:100%; background:#ffffff; border:1px solid #e4e4e7; border-radius:10px; padding:.55rem .75rem; font-size:.875rem; color:inherit; outline:none; transition:border-color .15s; }
  html.dark .input, html.dark .select, html.dark .textarea { background:#0c0c0f; border-color:#27272a; }
  .input:focus, .select:focus, .textarea:focus { border-color:#a1a1aa; }

  /* ── Chips / badges ── */
  .chip { display:inline-flex; align-items:center; gap:.35rem; padding:.2rem .55rem; border-radius:9999px; font-size:.72rem; font-weight:500; background:#f4f4f5; color:#3f3f46; }
  html.dark .chip { background:#18181b; color:#d4d4d8; }

  /* ── Navigation ── */
  .nav-item { display:flex; align-items:center; gap:.7rem; padding:.55rem .75rem; border-radius:10px; color:#52525b; font-size:.9rem; font-weight:500; cursor:pointer; transition:background .15s, color .15s; }
  .nav-item:hover { background:#f4f4f5; color:#09090b; }
  .nav-item.active { background:#f4f4f5; color:#09090b; }
  html.dark .nav-item { color:#a1a1aa; }
  html.dark .nav-item:hover, html.dark .nav-item.active { background:#18181b; color:#fafafa; }

  .tab-item { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; flex:1; padding:.4rem 0; color:#71717a; font-size:.65rem; font-weight:500; }
  .tab-item.active { color:#09090b; }
  html.dark .tab-item { color:#a1a1aa; }
  html.dark .tab-item.active { color:#fafafa; }

  /* ── Skeleton loader ── */
  .skeleton { background:linear-gradient(90deg,#f4f4f5 25%,#e4e4e7 50%,#f4f4f5 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
  html.dark .skeleton { background:linear-gradient(90deg,#18181b 25%,#27272a 50%,#18181b 75%); background-size:200% 100%; }
  @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

  /* ── Modal ── */
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.45); backdrop-filter:blur(2px); z-index:50; display:none; }
  .modal-backdrop.open { display:flex; align-items:flex-end; justify-content:center; }
  @media (min-width:640px) { .modal-backdrop.open { align-items:center; } }
  .modal { background:#fff; width:100%; max-width:520px; border-radius:18px 18px 0 0; max-height:92vh; overflow:auto; }
  @media (min-width:640px) { .modal { border-radius:18px; } }
  html.dark .modal { background:#0c0c0f; border:1px solid #27272a; }

  /* ── Toast ── */
  .toast { position:fixed; bottom:5.5rem; left:50%; transform:translateX(-50%); background:#09090b; color:#fafafa; padding:.6rem 1rem; border-radius:12px; font-size:.85rem; box-shadow:0 10px 30px rgba(0,0,0,.2); z-index:60; opacity:0; transition:opacity .2s, transform .2s; pointer-events:none; }
  html.dark .toast { background:#fafafa; color:#09090b; }
  .toast.show { opacity:1; transform:translate(-50%,-8px); }
  @media (min-width:768px) { .toast { bottom:1.5rem; } }

  /* ── Progress bar ── */
  .progress { height:6px; background:#f4f4f5; border-radius:9999px; overflow:hidden; }
  html.dark .progress { background:#18181b; }
  .progress > div { height:100%; border-radius:9999px; transition:width .4s ease; }

  /* ── Misc ── */
  .no-scrollbar::-webkit-scrollbar { display:none; }
  .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
  .icon-pill { width:36px; height:36px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
  .fab { position:fixed; right:1rem; bottom:5.25rem; width:54px; height:54px; border-radius:9999px; background:#09090b; color:#fafafa; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(0,0,0,.18); z-index:30; }
  html.dark .fab { background:#fafafa; color:#09090b; }
  @media (min-width:768px) { .fab { display:none; } }
  [data-lucide] { width:18px; height:18px; stroke-width:1.75; }

  /* ── Swipe-to-delete ── */
  .tx-swipe-wrapper { touch-action:pan-y; position:relative; overflow:hidden; }
  .tx-row-content { background:#ffffff; transition:transform .18s ease; will-change:transform; }
  html.dark .tx-row-content { background:#0c0c0f; }
  .tx-delete-bg { position:absolute; right:0; top:0; bottom:0; width:80px; background:#ef4444; display:flex; align-items:center; justify-content:center; }

  /* ── Month divider ── */
  .month-divider { display:flex; align-items:center; gap:.6rem; padding:.25rem; margin:.75rem 0 .5rem; }
  .month-divider-line { flex:1; border-top:1px solid #e4e4e7; }
  html.dark .month-divider-line { border-color:#27272a; }

  /* ── Print ── */
  @media print {
    body { background:#fff !important; color:#09090b !important; }
    header, aside, nav, .fab, .modal-backdrop, .toast { display:none !important; }
    main { padding:0 !important; margin:0 !important; }
    .max-w-5xl { max-width:none !important; }
    .card, .card-muted { border-color:#e4e4e7 !important; background:#fff !important; page-break-inside:avoid; }
    .btn { display:none !important; }
    canvas { max-height:240px; }
  }
</style>
</head>
<body class="min-h-full">

<!-- ── Mobile top bar ── -->
<header class="md:hidden sticky top-0 z-20 bg-white/80 dark:bg-[#0a0a0d]/80 backdrop-blur border-b border-zinc-200 dark:border-zinc-800">
  <div class="flex items-center justify-between px-4 h-14">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-zinc-900 text-white dark:bg-white dark:text-zinc-900 grid place-items-center font-semibold text-sm">P</div>
      <span class="font-semibold tracking-tight">Pocket</span>
    </div>
    <button class="btn btn-ghost" onclick="window.__app.openModal('settings',{})" title="Settings">
      <i data-lucide="settings"></i>
    </button>
  </div>
</header>

<!-- ── Layout shell ── -->
<div class="md:flex md:min-h-screen">

  <!-- Sidebar (desktop) -->
  <aside class="hidden md:flex md:flex-col md:w-64 md:fixed md:inset-y-0 md:border-r md:border-zinc-200 dark:md:border-zinc-800 md:bg-white dark:md:bg-[#0a0a0d] p-5 gap-1">
    <div class="flex items-center gap-2 mb-6">
      <div class="w-9 h-9 rounded-xl bg-zinc-900 text-white dark:bg-white dark:text-zinc-900 grid place-items-center font-semibold">P</div>
      <div>
        <div class="font-semibold tracking-tight">Pocket</div>
        <div class="text-xs text-zinc-500">Personal finance</div>
      </div>
    </div>

    <!-- Navigation items injected by Navigation component -->
    <nav id="sidebarNav" class="flex flex-col gap-1"></nav>

    <div class="mt-auto pt-4 border-t border-zinc-200 dark:border-zinc-800 flex flex-col gap-1">
      <!-- Auth pill injected by Navigation component -->
      <div id="authPill"></div>
      <button class="nav-item w-full"
              onclick="window.__app.openModal('settings',{})">
        <i data-lucide="settings"></i> Settings
      </button>
    </div>
  </aside>

  <!-- Main content area -->
  <main class="md:pl-64 w-full">
    <div class="max-w-5xl mx-auto px-4 md:px-8 py-5 md:py-8 pb-28 md:pb-12">
      <!-- Active view renders here -->
      <div id="viewContent"></div>
    </div>
  </main>
</div>

<!-- ── Mobile bottom tab bar ── -->
<nav class="md:hidden fixed bottom-0 inset-x-0 z-20 bg-white/95 dark:bg-[#0a0a0d]/95 backdrop-blur border-t border-zinc-200 dark:border-zinc-800">
  <div id="bottomNav" class="flex">
    <!-- Tab items injected by Navigation component -->
  </div>
</nav>

<!-- ── Mobile floating add button ── -->
<button class="fab"
        onclick="window.__app.openModal('transaction',{})"
        aria-label="Add transaction">
  <i data-lucide="plus" style="width:22px;height:22px"></i>
</button>

<!--
  Modal backdrop + card are programmatically created by Modal.mount().
  Toast is programmatically created by Toast.mount().
  Both are appended to #app.
-->
<div id="app"></div>

<!-- ── Application entry point ── -->
<script type="module" src="src/app.js"></script>
</body>
</html>
