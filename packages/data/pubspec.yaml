dependencies:
  pocket_domain:
    path: ../domain
  # Added as the data layer is implemented:
  #   drift, sqlite3_flutter_libs, supabase_flutter, powersync, http

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
